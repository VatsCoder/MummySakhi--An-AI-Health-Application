<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile - HealthMemory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-circle"></div>
            HealthMemory
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/profile" class="active">Profile</a>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </nav>

    <main class="profile-container">
        <div class="profile-card">
            <h1>Your Profile</h1>
            
            <form action="/save-profile" method="POST">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="e.g. 38" value="{{ user.get('age', '') }}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" name="height" placeholder="165" value="{{ user.get('height', '') }}">
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" placeholder="62" value="{{ user.get('weight', '') }}">
                    </div>
                </div>

                <div class="form-group">
                    <label for="conditions">Existing Conditions</label>
                    <textarea id="conditions" name="conditions" placeholder="e.g. Thyroid, Mild Anemia (Optional)">{{ user.get('condn', '') }}</textarea>
                </div>

                <button type="submit" class="btn-save">Save Profile</button>
            </form>
        </div>
    </main>

</body>
</html>
